<div class="login-wrapper">
  <!-- Background grid effect -->
  <div class="bg-grid"></div>

  <div class="login-card">
    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">✈</div>
      <h1 class="brand-title">AeroMRO</h1>
      <p class="brand-subtitle">Aviation Inventory Management</p>
    </div>

    <!-- Form -->
    <div class="form-group">
      <label for="username">Username</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input
          id="username"
          type="text"
          [(ngModel)]="username"
          placeholder="Enter your username"
          autocomplete="username"
          (keyup.enter)="onLogin()"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          (keyup.enter)="onLogin()"
        />
        <span class="toggle-password" (click)="togglePassword()">
          {{ showPassword ? '🙈' : '👁️' }}
        </span>
      </div>
    </div>

    <!-- Error -->
    <div class="error-msg" *ngIf="errorMessage">
      ⚠️ {{ errorMessage }}
    </div>

    <!-- Submit -->
    <button
      class="login-btn"
      (click)="onLogin()"
      [disabled]="isLoading"
    >
      <span *ngIf="!isLoading">Sign In</span>
      <span *ngIf="isLoading" class="spinner">⟳ Authenticating...</span>
    </button>

    <p class="footer-note">Secured • Aviation MRO System</p>
  </div>
</div>
